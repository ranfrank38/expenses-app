<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="הוצאות" />
  
  <meta name="theme-color" content="#064e3b" />
  <title>ההוצאות שלנו — רן ושרון</title>
  
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌿</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌿</text></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body { 
      background: #fafaf9; 
      /* מונע הקפצה של המסך כשגוללים באייפון */
      overscroll-behavior-y: none;
    }
    body { 
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // ============================================================
    // 🔐 Supabase Configuration
    // ============================================================
    const SUPABASE_URL = "https://xdnzmlihuvjpqzullkeg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1mh3rb8mq1zYjB4kVh4WYg_GwocC5Y5";
    const EXPENSES_TABLE = "expenses";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: false },
      realtime: { params: { eventsPerSecond: 5 } },
    });

    // ============================================================
    // 🎨 Inline SVG Icon Components (Lucide-style)
    // ============================================================
    const Icon = ({ children, size = 18, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
        viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
        className={className}>{children}</svg>
    );
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const ArrowLeftRight = (p) => <Icon {...p}><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></Icon>;
    const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></Icon>;
    const CalendarIcon = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const Check = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
    const WifiOff = (p) => <Icon {...p}><path d="M12 20h.01"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5 12.859a10 10 0 0 1 5.17-2.69"/><path d="M19 12.859a10 10 0 0 0-2.007-1.523"/><path d="M2 8.82a15 15 0 0 1 4.177-2.643"/><path d="M22 8.82a15 15 0 0 0-11.288-3.764"/><path d="m2 2 20 20"/></Icon>;

    // ============================================================
    // 🗓️ Date helpers
    // ============================================================
    const HEBREW_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const HEBREW_DAYS_SHORT = ["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
    const HEBREW_DAYS_LONG = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

    const pad = (n) => String(n).padStart(2, "0");
    const toISO = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
    const formatYearMonth = (date) => `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
    const todayISO = () => {
      const d = new Date();
      return toISO(d.getFullYear(), d.getMonth(), d.getDate());
    };
    const nowHHMM = () => {
      const d = new Date();
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    // Map DB row → local shape (DB uses `user_name`, locally we use `user`)
    const mapFromDb = (row) => ({
      id: row.id,
      amount: Number(row.amount),
      description: row.description || "ללא פירוט",
      user: row.user_name,
      date: row.date,
      time: row.time || "",
    });

    // ============================================================
    // 🌿 App
    // ============================================================
    function App() {
      const [currentUser, setCurrentUser] = useState("ran");
      const [amount, setAmount] = useState("");
      const [description, setDescription] = useState("");
      const [selectedDate, setSelectedDate] = useState(todayISO());
      const [calendarMonth, setCalendarMonth] = useState(() => {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), 1);
      });
      const [showSuccess, setShowSuccess] = useState(false);
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      // ===== Load + realtime sync =====
      useEffect(() => {
        let mounted = true;

        async function fetchExpenses() {
          setLoading(true);
          setErrorMsg("");
          const { data, error } = await supabase
            .from(EXPENSES_TABLE)
            .select("*")
            .order("date", { ascending: false })
            .order("time", { ascending: false });

          if (!mounted) return;
          if (error) {
            console.error("Supabase fetch error:", error);
            setErrorMsg("בעיית חיבור — בודק מחדש...");
          } else {
            setExpenses((data || []).map(mapFromDb));
          }
          setLoading(false);
        }

        fetchExpenses();

        const channel = supabase
          .channel("expenses-realtime")
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: EXPENSES_TABLE },
            (payload) => {
              if (payload.eventType === "INSERT") {
                const incoming = mapFromDb(payload.new);
                setExpenses((prev) => {
                  if (prev.some((e) => e.id === incoming.id)) return prev;
                  return [incoming, ...prev];
                });
              } else if (payload.eventType === "DELETE") {
                setExpenses((prev) => prev.filter((e) => e.id !== payload.old.id));
              } else if (payload.eventType === "UPDATE") {
                const updated = mapFromDb(payload.new);
                setExpenses((prev) => prev.map((e) => (e.id === updated.id ? updated : e)));
              }
            }
          )
          .subscribe();

        return () => {
          mounted = false;
          supabase.removeChannel(channel);
        };
      }, []);

      // ===== Helpers =====
      const getExpensesForDate = (date) => expenses.filter((e) => e.date === date);

      const dayExpenses = getExpensesForDate(selectedDate);
      const ranExpenses = dayExpenses.filter((e) => e.user === "ran");
      const sharonExpenses = dayExpenses.filter((e) => e.user === "sharon");
      const ranTotal = ranExpenses.reduce((s, e) => s + e.amount, 0);
      const sharonTotal = sharonExpenses.reduce((s, e) => s + e.amount, 0);
      const dailyTotal = ranTotal + sharonTotal;

      const monthKey = formatYearMonth(calendarMonth);
      const monthExpenses = expenses.filter((e) => e.date && e.date.startsWith(monthKey));
      const monthRanTotal = monthExpenses.filter((e) => e.user === "ran").reduce((s, e) => s + e.amount, 0);
      const monthSharonTotal = monthExpenses.filter((e) => e.user === "sharon").reduce((s, e) => s + e.amount, 0);
      const monthTotal = monthRanTotal + monthSharonTotal;

      // ===== Add expense (optimistic) =====
      const handleAddExpense = async () => {
        if (!amount || saving) return;
        const today = todayISO();
        const tempId = `tmp-${Date.now()}`;
        const optimistic = {
          id: tempId,
          amount: parseFloat(amount),
          description: description.trim() || "ללא פירוט",
          user: currentUser,
          date: today,
          time: nowHHMM(),
        };

        setExpenses((prev) => [optimistic, ...prev]);
        setAmount("");
        setDescription("");
        setShowSuccess(true);
        setTimeout(() => setShowSuccess(false), 1500);
        if (selectedDate !== today) setSelectedDate(today);
        setSaving(true);

        const { data, error } = await supabase
          .from(EXPENSES_TABLE)
          .insert({
            amount: optimistic.amount,
            description: optimistic.description,
            user_name: optimistic.user,
            date: optimistic.date,
            time: optimistic.time,
          })
          .select()
          .single();

        setSaving(false);

        if (error) {
          console.error("Supabase insert error:", error);
          setExpenses((prev) => prev.filter((e) => e.id !== tempId));
          setErrorMsg("שמירה נכשלה — נסה שוב");
          setTimeout(() => setErrorMsg(""), 2500);
        } else if (data) {
          const real = mapFromDb(data);
          setExpenses((prev) => {
            const withoutTemp = prev.filter((e) => e.id !== tempId);
            if (withoutTemp.some((e) => e.id === real.id)) return withoutTemp;
            return [real, ...withoutTemp];
          });
        }
      };

      const toggleUser = () => setCurrentUser(currentUser === "ran" ? "sharon" : "ran");

      const goToPrevMonth = () => {
        const d = new Date(calendarMonth);
        d.setMonth(d.getMonth() - 1);
        setCalendarMonth(d);
      };
      const goToNextMonth = () => {
        const d = new Date(calendarMonth);
        d.setMonth(d.getMonth() + 1);
        setCalendarMonth(d);
      };
      const resetToToday = () => {
        const t = todayISO();
        const d = new Date();
        setSelectedDate(t);
        setCalendarMonth(new Date(d.getFullYear(), d.getMonth(), 1));
      };

      const userName = currentUser === "ran" ? "רן" : "שרון";
      const userInitial = currentUser === "ran" ? "ר" : "ש";

      function getCalendarCells(monthDate) {
        const year = monthDate.getFullYear();
        const month = monthDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const daysInMonth = lastDay.getDate();
        const startDow = firstDay.getDay();
        const cells = [];
        for (let i = 0; i < startDow; i++) cells.push(null);
        for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, date: toISO(year, month, d) });
        while (cells.length % 7 !== 0) cells.push(null);
        return cells;
      }

      const cells = getCalendarCells(calendarMonth);
      const TODAY = todayISO();
      const isViewingToday = selectedDate === TODAY;
      const selectedDateObj = new Date(selectedDate);
      const selectedDateLabel = isViewingToday
        ? "היום"
        : `יום ${HEBREW_DAYS_LONG[selectedDateObj.getDay()]}, ${selectedDateObj.getDate()} ב${HEBREW_MONTHS[selectedDateObj.getMonth()]}`;

      return (
        <div dir="rtl" className="min-h-screen bg-stone-50 font-sans antialiased">
          <div className="max-w-md mx-auto min-h-screen bg-stone-50 px-5 pt-8 pb-10">
            {/* Header */}
            <div className="flex items-center justify-between mb-7">
              <div>
                <h1 className="text-3xl font-bold text-emerald-900 tracking-tight">ההוצאות שלנו</h1>
                <p className="text-xs text-stone-500 mt-1 flex items-center gap-1.5">
                  {errorMsg ? (
                    <>
                      <WifiOff size={11} className="text-amber-500" />
                      <span className="text-amber-700">{errorMsg}</span>
                    </>
                  ) : loading ? (
                    <>
                      <Loader2 size={11} className="text-emerald-500 animate-spin" />
                      <span>מסתנכרן...</span>
                    </>
                  ) : (
                    <>
                      <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                      <span>סנכרון פעיל</span>
                    </>
                  )}
                </p>
              </div>
              <button
                onClick={toggleUser}
                className="flex items-center gap-2 bg-white px-3 py-2 rounded-full shadow-sm border border-emerald-100 hover:shadow-md transition-all duration-300 active:scale-95"
              >
                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-inner bg-gradient-to-br ${currentUser === "ran" ? "from-emerald-300 to-emerald-500" : "from-amber-300 to-amber-500"}`}>
                  {userInitial}
                </div>
                <span className="text-sm font-semibold text-emerald-900">{userName}</span>
                <ArrowLeftRight size={14} className="text-emerald-600" />
              </button>
            </div>

            {/* Daily total card */}
            <div className="relative bg-gradient-to-br from-emerald-200 via-emerald-100 to-stone-50 rounded-[2.5rem] p-7 shadow-md mb-6 overflow-hidden border border-emerald-100/50">
              <div className="absolute -top-12 -left-12 w-40 h-40 bg-emerald-300/40 rounded-full blur-2xl"></div>
              <div className="absolute -bottom-10 -right-10 w-32 h-32 bg-emerald-200/60 rounded-full blur-2xl"></div>
              <div className="relative">
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2 text-emerald-800">
                    <div className="w-8 h-8 rounded-full bg-white/60 backdrop-blur-sm flex items-center justify-center">
                      <TrendingUp size={16} className="text-emerald-700" />
                    </div>
                    <span className="text-sm font-medium">סכום ל{selectedDateLabel}</span>
                  </div>
                  {!isViewingToday && (
                    <button
                      onClick={resetToToday}
                      className="flex items-center gap-1 bg-white/60 backdrop-blur-sm hover:bg-white text-emerald-800 text-[11px] font-semibold rounded-full px-2.5 py-1 transition active:scale-95"
                    >
                      <RotateCcw size={11} />
                      <span>חזרה להיום</span>
                    </button>
                  )}
                </div>
                <div className="flex items-baseline gap-1">
                  <span className="text-5xl font-bold text-emerald-950 tracking-tight">
                    {dailyTotal.toLocaleString()}
                  </span>
                  <span className="text-2xl font-semibold text-emerald-800">₪</span>
                </div>
                <div className="flex items-center gap-2 mt-3">
                  <Sparkles size={12} className="text-emerald-600" />
                  <span className="text-xs text-emerald-700 font-medium">
                    {dayExpenses.length} {dayExpenses.length === 1 ? "הוצאה" : "הוצאות"} • רן {ranTotal}₪ • שרון {sharonTotal}₪
                  </span>
                </div>
              </div>
            </div>

            {/* Add expense form */}
            <div className="bg-white rounded-[2rem] p-5 shadow-sm mb-6 border border-stone-100">
              <h2 className="text-base font-bold text-emerald-900 mb-4 px-1">הוספת הוצאה חדשה</h2>
              <div className="space-y-3">
                <div className="relative">
                  <input
                    type="number"
                    inputMode="decimal"
                    placeholder="סכום"
                    value={amount}
                    onChange={(e) => setAmount(e.target.value)}
                    className="w-full bg-stone-50 rounded-2xl px-5 py-4 text-emerald-950 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:bg-white transition-all text-right text-lg font-medium"
                  />
                  <span className="absolute left-5 top-1/2 -translate-y-1/2 text-stone-400 text-lg">₪</span>
                </div>
                <input
                  type="text"
                  placeholder="על מה ההוצאה? (לא חובה)"
                  value={description}
                  onChange={(e) => setDescription(e.target.value)}
                  className="w-full bg-stone-50 rounded-2xl px-5 py-4 text-emerald-950 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:bg-white transition-all text-right"
                />
                <button
                  onClick={handleAddExpense}
                  disabled={!amount || saving}
                  className={`w-full rounded-2xl py-4 font-semibold flex items-center justify-center gap-2 transition-all duration-500 shadow-md hover:shadow-lg active:scale-[0.98] disabled:active:scale-100 text-white ${
                    showSuccess
                      ? "bg-gradient-to-br from-emerald-400 to-emerald-600 scale-[1.02]"
                      : "bg-gradient-to-br from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800 disabled:from-stone-300 disabled:to-stone-400"
                  }`}
                >
                  {showSuccess ? (
                    <span className="flex items-center gap-2">
                      <span className="relative flex items-center justify-center">
                        <span className="absolute inline-flex h-7 w-7 rounded-full bg-white/40 animate-ping"></span>
                        <Sparkles size={14} className="absolute -top-2 -right-2 text-yellow-200 animate-pulse" />
                        <Check size={22} strokeWidth={3} className="relative" />
                      </span>
                      <span>נשמר!</span>
                    </span>
                  ) : saving ? (
                    <>
                      <Loader2 size={20} className="animate-spin" />
                      <span>שומר...</span>
                    </>
                  ) : (
                    <>
                      <Plus size={20} strokeWidth={2.5} />
                      <span>הוספה</span>
                    </>
                  )}
                </button>
              </div>
            </div>

            {/* Inline calendar */}
            <div className="bg-white rounded-[2rem] p-5 shadow-sm border border-stone-100 mb-6">
              <div className="flex items-center justify-between mb-4">
                <button
                  onClick={goToPrevMonth}
                  className="w-9 h-9 rounded-2xl bg-stone-50 hover:bg-stone-100 flex items-center justify-center transition active:scale-95"
                >
                  <ChevronRight size={16} className="text-emerald-700" />
                </button>
                <div className="flex items-center gap-2">
                  <CalendarIcon size={14} className="text-emerald-600" />
                  <span className="text-sm font-bold text-emerald-900">
                    {HEBREW_MONTHS[calendarMonth.getMonth()]} {calendarMonth.getFullYear()}
                  </span>
                </div>
                <button
                  onClick={goToNextMonth}
                  className="w-9 h-9 rounded-2xl bg-stone-50 hover:bg-stone-100 flex items-center justify-center transition active:scale-95"
                >
                  <ChevronLeft size={16} className="text-emerald-700" />
                </button>
              </div>

              <div className="grid grid-cols-7 gap-1 mb-1.5">
                {HEBREW_DAYS_SHORT.map((d, i) => (
                  <div key={i} className="text-center text-[10px] font-bold text-stone-400 py-1">{d}</div>
                ))}
              </div>

              <div className="grid grid-cols-7 gap-1">
                {cells.map((cell, idx) => {
                  if (!cell) return <div key={idx} className="aspect-square" />;
                  const dayExp = getExpensesForDate(cell.date);
                  const hasExpenses = dayExp.length > 0;
                  const ranHas = dayExp.some((e) => e.user === "ran");
                  const sharonHas = dayExp.some((e) => e.user === "sharon");
                  const isToday = cell.date === TODAY;
                  const isSelected = selectedDate === cell.date;

                  return (
                    <button
                      key={idx}
                      onClick={() => setSelectedDate(cell.date)}
                      className={`aspect-square rounded-2xl flex flex-col items-center justify-center transition-all duration-200 relative ${
                        isSelected
                          ? "bg-emerald-700 text-white shadow-md scale-105"
                          : hasExpenses
                          ? "bg-stone-50 hover:bg-emerald-50 active:scale-95"
                          : "bg-transparent hover:bg-stone-50 active:scale-95"
                      } ${isToday && !isSelected ? "ring-2 ring-emerald-400 ring-inset" : ""}`}
                    >
                      <span className={`text-[12px] font-bold leading-none ${
                        isSelected ? "text-white"
                        : isToday ? "text-emerald-700"
                        : hasExpenses ? "text-emerald-900"
                        : "text-stone-400"
                      }`}>
                        {cell.day}
                      </span>
                      <div className="flex gap-0.5 mt-1 h-1.5 items-center justify-center">
                        {ranHas && <span className={`w-1.5 h-1.5 rounded-full ${isSelected ? "bg-white" : "bg-emerald-500"}`}></span>}
                        {sharonHas && <span className={`w-1.5 h-1.5 rounded-full ${isSelected ? "bg-amber-200" : "bg-amber-400"}`}></span>}
                      </div>
                    </button>
                  );
                })}
              </div>

              <div className="flex items-center justify-center gap-5 mt-4 pt-3 border-t border-stone-100">
                <div className="flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
                  <span className="text-[11px] text-stone-600 font-medium">רן</span>
                </div>
                <div className="flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full bg-amber-400"></span>
                  <span className="text-[11px] text-stone-600 font-medium">שרון</span>
                </div>
              </div>

              <div className="mt-4 pt-4 border-t border-stone-100">
                <div className="text-[11px] text-stone-500 font-medium mb-2.5 text-center">
                  סיכום {HEBREW_MONTHS[calendarMonth.getMonth()]}
                </div>
                <div className="grid grid-cols-3 gap-2">
                  <div className="bg-emerald-50 rounded-2xl p-3 text-center border border-emerald-100/50">
                    <div className="flex items-center justify-center gap-1 mb-1.5">
                      <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                      <span className="text-[10px] text-emerald-700 font-semibold">רן הוציא</span>
                    </div>
                    <div className="text-base font-bold text-emerald-900 leading-none">
                      {monthRanTotal.toLocaleString()}
                      <span className="text-[10px] font-semibold text-emerald-700 mr-0.5">₪</span>
                    </div>
                  </div>
                  <div className="bg-amber-50 rounded-2xl p-3 text-center border border-amber-100/50">
                    <div className="flex items-center justify-center gap-1 mb-1.5">
                      <span className="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                      <span className="text-[10px] text-amber-800 font-semibold">שרון הוציאה</span>
                    </div>
                    <div className="text-base font-bold text-amber-900 leading-none">
                      {monthSharonTotal.toLocaleString()}
                      <span className="text-[10px] font-semibold text-amber-800 mr-0.5">₪</span>
                    </div>
                  </div>
                  <div className="bg-gradient-to-br from-emerald-700 to-emerald-900 rounded-2xl p-3 text-center shadow-sm">
                    <div className="flex items-center justify-center gap-1 mb-1.5">
                      <Sparkles size={10} className="text-emerald-100" />
                      <span className="text-[10px] text-emerald-100 font-semibold">ביחד</span>
                    </div>
                    <div className="text-base font-bold text-white leading-none">
                      {monthTotal.toLocaleString()}
                      <span className="text-[10px] font-semibold text-emerald-100 mr-0.5">₪</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Filtered expenses for selected date */}
            <div>
              <div className="flex items-center justify-between mb-3 px-1">
                <h2 className="text-base font-bold text-emerald-900">
                  {isViewingToday ? "הוצאות היום" : `הוצאות ${selectedDateLabel}`}
                </h2>
                <span className="text-xs text-stone-500">
                  {dayExpenses.length} {dayExpenses.length === 1 ? "פריט" : "פריטים"}
                </span>
              </div>

              {dayExpenses.length === 0 ? (
                <div className="bg-white rounded-[2rem] p-10 text-center border border-stone-100 shadow-sm">
                  <div className="w-12 h-12 rounded-2xl bg-stone-50 flex items-center justify-center mx-auto mb-3">
                    <CalendarIcon size={20} className="text-stone-300" />
                  </div>
                  <p className="text-sm text-stone-400 font-medium">
                    {loading ? "טוען נתונים..." : "אין הוצאות בתאריך זה"}
                  </p>
                  {!loading && <p className="text-xs text-stone-300 mt-1">בחר יום אחר בלוח השנה</p>}
                </div>
              ) : (
                <>
                  <div className="grid grid-cols-2 gap-3">
                    {[
                      { key: "ran", name: "רן", initial: "ר", items: ranExpenses, total: ranTotal,
                        gradient: "from-emerald-400 to-emerald-600", headerBg: "from-emerald-100 to-emerald-50", dotColor: "bg-emerald-500" },
                      { key: "sharon", name: "שרון", initial: "ש", items: sharonExpenses, total: sharonTotal,
                        gradient: "from-amber-400 to-amber-600", headerBg: "from-amber-100 to-amber-50", dotColor: "bg-amber-400" },
                    ].map((col) => {
                      const isCurrentUser = col.key === currentUser;
                      const displayName = isCurrentUser ? "אני" : col.name;
                      return (
                        <div key={col.key}
                          className={`bg-white rounded-3xl p-3 shadow-sm border ${isCurrentUser ? "border-emerald-300" : "border-stone-100"} flex flex-col`}>
                          <div className={`bg-gradient-to-br ${col.headerBg} rounded-2xl p-3 mb-2.5`}>
                            <div className="flex items-center gap-2 mb-1.5">
                              <div className={`w-8 h-8 rounded-xl bg-gradient-to-br ${col.gradient} flex items-center justify-center text-white font-bold text-sm shadow-sm flex-shrink-0`}>
                                {col.initial}
                              </div>
                              <div className="min-w-0">
                                <div className="flex items-center gap-1">
                                  <span className={`w-1.5 h-1.5 rounded-full ${col.dotColor}`}></span>
                                  <div className="text-xs font-semibold text-emerald-900 truncate">{displayName}</div>
                                </div>
                                <div className="text-[10px] text-stone-500">{col.items.length} הוצאות</div>
                              </div>
                            </div>
                            <div className="flex items-baseline gap-0.5">
                              <span className="text-xl font-bold text-emerald-950">{col.total.toLocaleString()}</span>
                              <span className="text-sm text-emerald-700 font-semibold">₪</span>
                            </div>
                          </div>
                          <div className="space-y-1.5 flex-1">
                            {col.items.length === 0 ? (
                              <div className="text-center py-4 text-xs text-stone-400">אין הוצאות</div>
                            ) : (
                              col.items.slice().sort((a, b) => (b.time || "").localeCompare(a.time || ""))
                                .map((expense) => (
                                  <div key={expense.id}
                                    className={`bg-stone-50 rounded-2xl p-2.5 hover:bg-stone-100 transition-colors ${String(expense.id).startsWith("tmp-") ? "opacity-60" : ""}`}>
                                    <div className="flex items-baseline justify-between gap-1 mb-0.5">
                                      <span className="text-sm font-bold text-emerald-950">
                                        {expense.amount.toLocaleString()}
                                        <span className="text-[10px] text-stone-400 mr-0.5">₪</span>
                                      </span>
                                      <span className="text-[10px] text-stone-400 flex-shrink-0">{expense.time}</span>
                                    </div>
                                    <div className="text-[11px] text-stone-600 truncate leading-tight">{expense.description}</div>
                                  </div>
                                ))
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="mt-3 bg-gradient-to-l from-emerald-700 to-emerald-900 rounded-3xl p-4 shadow-md flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <div className="w-9 h-9 rounded-2xl bg-white/15 backdrop-blur-sm flex items-center justify-center">
                        <Sparkles size={16} className="text-emerald-100" />
                      </div>
                      <div>
                        <div className="text-xs text-emerald-100/80 font-medium">סה״כ ל{selectedDateLabel}</div>
                        <div className="text-[10px] text-emerald-200/70">
                          רן {ranTotal.toLocaleString()}₪ • שרון {sharonTotal.toLocaleString()}₪
                        </div>
                      </div>
                    </div>
                    <div className="flex items-baseline gap-0.5">
                      <span className="text-2xl font-bold text-white">{dailyTotal.toLocaleString()}</span>
                      <span className="text-base text-emerald-100 font-semibold">₪</span>
                    </div>
                  </div>
                </>
              )}
            </div>

            <div className="mt-8 text-center">
              <p className="text-xs text-stone-400">ניהול הוצאות בני זוג • רן ושרון</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
