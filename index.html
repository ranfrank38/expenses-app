<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="הוצאות" />
  <meta name="theme-color" content="#064e3b" />
  <title>ההוצאות שלנו — רן ושרון</title>
  
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/188/188333.png">
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/188/188333.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body { background: #fafaf9; overscroll-behavior-y: none; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://xdnzmlihuvjpqzullkeg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1mh3rb8mq1zYjB4kVh4WYg_GwocC5Y5";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- Icons ---
    const Trash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const Edit3 = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;

    function App() {
      const [currentUser, setCurrentUser] = useState("ran");
      const [amount, setAmount] = useState("");
      const [description, setDescription] = useState("");
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editingId, setEditingId] = useState(null);

      useEffect(() => {
        fetchExpenses();
        const channel = supabase.channel('schema-db-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, fetchExpenses)
          .subscribe();
        return () => supabase.removeChannel(channel);
      }, []);

      async function fetchExpenses() {
        const { data } = await supabase.from('expenses').select('*').order('date', { ascending: false }).order('time', { ascending: false });
        if (data) setExpenses(data);
        setLoading(false);
      }

      async function handleSave() {
        if (!amount) return;
        const payload = { 
          amount: parseFloat(amount), 
          description: description || "ללא פירוט", 
          user_name: currentUser,
          date: new Date().toISOString().split('T')[0],
          time: new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'})
        };

        if (editingId) {
          await supabase.from('expenses').update(payload).eq('id', editingId);
          setEditingId(null);
        } else {
          await supabase.from('expenses').insert([payload]);
        }
        
        setAmount(""); setDescription(""); fetchExpenses();
      }

      async function deleteExpense(id) {
        if (confirm("למחוק את ההוצאה?")) {
          await supabase.from('expenses').delete().eq('id', id);
          fetchExpenses();
        }
      }

      function startEdit(exp) {
        setEditingId(exp.id);
        setAmount(exp.amount);
        setDescription(exp.description);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      const dailyTotal = expenses.filter(e => e.date === new Date().toISOString().split('T')[0]).reduce((s, e) => s + Number(e.amount), 0);

      return (
        <div className="max-w-md mx-auto p-5 pb-20">
          <div className="flex justify-between items-center mb-6">
            <h1 className="text-2xl font-bold text-emerald-900">ההוצאות שלנו</h1>
            <button onClick={() => setCurrentUser(currentUser === "ran" ? "sharon" : "ran")} className="bg-white px-4 py-2 rounded-full shadow-sm border text-sm font-bold">
              {currentUser === "ran" ? "רן 🧔‍♂️" : "שרון 👩‍🦰"}
            </button>
          </div>

          <div className="bg-emerald-800 text-white p-6 rounded-3xl shadow-lg mb-6">
            <p className="text-emerald-100 text-sm">סה"כ היום</p>
            <h2 className="text-4xl font-bold">₪{dailyTotal}</h2>
          </div>

          <div className="bg-white p-4 rounded-2xl shadow-sm mb-8 border border-stone-100">
            <input type="number" placeholder="סכום" value={amount} onChange={e => setAmount(e.target.value)} className="w-full mb-2 p-3 bg-stone-50 rounded-xl text-lg font-bold" />
            <input type="text" placeholder="פירוט" value={description} onChange={e => setDescription(e.target.value)} className="w-full mb-3 p-3 bg-stone-50 rounded-xl" />
            <button onClick={handleSave} className="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold">
              {editingId ? "עדכן הוצאה" : "הוסף הוצאה"}
            </button>
            {editingId && <button onClick={() => {setEditingId(null); setAmount(""); setDescription("");}} className="w-full text-stone-400 text-sm mt-2">ביטול עריכה</button>}
          </div>

          <div className="space-y-3">
            {expenses.map(exp => (
              <div key={exp.id} className="bg-white p-4 rounded-xl shadow-sm border border-stone-50 flex justify-between items-center">
                <div>
                  <div className="font-bold text-emerald-950">₪{exp.amount}</div>
                  <div className="text-xs text-stone-500">{exp.description} | {exp.user_name === 'ran' ? 'רן' : 'שרון'}</div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => startEdit(exp)} className="p-2 text-stone-400 hover:text-emerald-600"><Edit3 /></button>
                  <button onClick={() => deleteExpense(exp.id)} className="p-2 text-stone-400 hover:text-red-500"><Trash2 /></button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
