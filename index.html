<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="הוצאות" />
  <meta name="theme-color" content="#064e3b" />
  <title>ההוצאות שלנו</title>
  
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/188/188333.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body { background: #fafaf9; overscroll-behavior-y: none; font-family: system-ui, -apple-system, sans-serif; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .btn-active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // הגדרות סופבייס
    const SUPABASE_URL = "https://xdnzmlihuvjpqzullkeg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1mh3rb8mq1zYjB4kVh4WYg_GwocC5Y5";
    
    // יצירת קליינט בצורה בטוחה
    let supabase;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.error("Supabase error", e);
    }

    const HEBREW_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const HEBREW_DAYS = ["א'","ב'","ג'","ד'","ה'","ו'","ש'"];

    function App() {
      const [currentUser, setCurrentUser] = useState("ran");
      const [amount, setAmount] = useState("");
      const [description, setDescription] = useState("");
      const [expenses, setExpenses] = useState([]);
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [calendarMonth, setCalendarMonth] = useState(new Date());
      const [editingId, setEditingId] = useState(null);

      useEffect(() => {
        if (supabase) {
          fetchExpenses();
          const channel = supabase.channel('any')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, fetchExpenses)
            .subscribe();
          return () => supabase.removeChannel(channel);
        }
      }, []);

      async function fetchExpenses() {
        const { data, error } = await supabase.from('expenses').select('*').order('date', { ascending: false });
        if (data) setExpenses(data);
      }

      async function handleSave() {
        if (!amount || !supabase) return;
        const payload = { 
          amount: parseFloat(amount), 
          description: description || "ללא פירוט", 
          user_name: currentUser,
          date: selectedDate,
          time: new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'})
        };

        if (editingId) {
          await supabase.from('expenses').update(payload).eq('id', editingId);
          setEditingId(null);
        } else {
          await supabase.from('expenses').insert([payload]);
        }
        setAmount(""); setDescription("");
      }

      async function deleteExpense(id) {
        if (confirm("למחוק את ההוצאה?")) {
          await supabase.from('expenses').delete().eq('id', id);
        }
      }

      const year = calendarMonth.getFullYear();
      const month = calendarMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const cells = [...Array(firstDay).fill(null), ...([...Array(daysInMonth).keys()].map(i => i + 1))];

      const filteredExpenses = expenses.filter(e => e.date === selectedDate);
      const dailyTotal = filteredExpenses.reduce((s, e) => s + Number(e.amount), 0);

      return (
        <div className="max-w-md mx-auto p-4 pb-12" dir="rtl">
          <div className="flex justify-between items-center mb-6 pt-4">
            <h1 className="text-2xl font-bold text-emerald-900">הוצאות רן ושרון</h1>
            <button onClick={() => setCurrentUser(currentUser === "ran" ? "sharon" : "ran")} 
                    className="bg-white px-4 py-2 rounded-full shadow-sm border text-sm font-bold">
              {currentUser === "ran" ? "רן 🧔‍♂️" : "שרון 👩‍🦰"}
            </button>
          </div>

          <div className="bg-emerald-800 text-white p-6 rounded-[2rem] shadow-lg mb-6 text-center">
            <p className="text-emerald-200 text-xs mb-1">סה"כ ל-{selectedDate}</p>
            <h2 className="text-4xl font-bold">₪{dailyTotal}</h2>
          </div>

          <div className="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-stone-100">
            <input type="number" placeholder="סכום" value={amount} onChange={e => setAmount(e.target.value)} className="w-full mb-3 p-4 bg-stone-50 rounded-xl text-xl font-bold text-center outline-none focus:ring-2 focus:ring-emerald-500" />
            <input type="text" placeholder="על מה?" value={description} onChange={e => setDescription(e.target.value)}
